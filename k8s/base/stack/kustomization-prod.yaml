# kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# list of Resource Config to be Applied
resources:
  - simulator.yaml
  - visualisation.yaml

patches:
  - target:
      kind: Deployment
      name:
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: rorla-engine.predictivemovement.se
  - target:
      kind: Ingress
      name: visualisation-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: rorla.predictivemovement.se
      - op: replace
        path: /spec/tls/0/hosts/0
        value: rorla.predictivemovement.se
  - target:
      kind: Ingress
      name: simulator-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: rorla-engine.predictivemovement.se
      - op: replace
        path: /spec/tls/0/hosts/0
        value: rorla-engine.predictivemovement.se

# namespace to deploy all Resources to
namespace: rorla
